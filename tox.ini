[tox]
envlist = py310,py311,py312,py313,py314

[gh-actions]
python =
    3.10: py310
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314

[testenv]
extras =
  full
deps = pynose
changedir = {envtmpdir}
commands =
    nosetests --where={toxinidir}/tests --ignore-files=citeproc-test.py -v
    python {toxinidir}/tests/citeproc-test.py --no-update

[testenv:py39]
passenv = GITHUB_*
deps =
    {[testenv]deps}
    coverage
    coveralls
commands =
    nosetests --where={toxinidir}/tests --ignore-files=citeproc-test.py \
              --with-coverage --cover-package=citeproc -v
    coverage run --source=citeproc --append {toxinidir}/tests/citeproc-test.py
    python {toxinidir}/coveralls.py || :
